name: Daily News Workflow

on:
  # 定时运行：每天 UTC 00:00（北京时间 08:00）
  schedule:
    - cron: '0 0 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  run-workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output/papers

      - name: Run workflow
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          GITHUB_ACTIONS: "true"
          OBSIDIAN_VAULT_PATH: ""
        run: python main.py

      - name: Commit and push results
        run: |
          git config --local user.email "workflow@github.com"
          git config --local user.name "Daily News Workflow"
          git add output/
          git diff --staged --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push